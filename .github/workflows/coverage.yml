name: Coverage

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  coverage:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - name: Cache cargo registry and build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
      - name: Install llvm-tools-preview and cargo-llvm-cov
        run: |
          rustup component add llvm-tools-preview
          cargo install cargo-llvm-cov
      - name: Install FFmpeg (macOS)
        run: brew install ffmpeg
      - name: Run coverage (exclude UI)
        run: |
          cargo llvm-cov --workspace --ignore-filename-regex='crates/.*/src/ui/' --lcov --output-path lcov.info
      - name: Check coverage threshold
        run: |
          set -o pipefail
          REPORT=$(cargo llvm-cov report --ignore-filename-regex='crates/.*/src/ui/' --summary-only)
          echo "$REPORT"
          COVERAGE=$(echo "$REPORT" | grep -oP '\d+\.\d+(?=%)')
          if [ -z "$COVERAGE" ]; then
            echo "::error::Could not determine coverage percentage!" && exit 1
          fi
          echo "Coverage: $COVERAGE%"
          COVERAGE_INT=${COVERAGE%.*}
          if [ "$COVERAGE_INT" -lt 80 ]; then
            echo "::error::Coverage $COVERAGE% is below 80%" && exit 1
          fi
